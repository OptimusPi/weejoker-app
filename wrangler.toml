# Wrangler configuration for Cloudflare Pages
name = "seed-finder-app"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[assets]]
directory = ".open-next/assets"


# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "weejoker-scores"
database_id = "efae89d7-55f9-4eb1-bdac-5d9dad0845a0"  # Weejoker Scores

# R2 Assets (Seeds) - currently unused but kept for future use
[[r2_buckets]]
binding = "SEED_ASSETS"
bucket_name = "seeds-1"

[ai]
binding = "AI"

